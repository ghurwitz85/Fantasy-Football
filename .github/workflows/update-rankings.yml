name: Refresh fantasy data
on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * *"
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run update-data
        env:
          RANKINGS_URL: ${{ secrets.RANKINGS_URL }}
          RANKINGS_API_KEY: ${{ secrets.RANKINGS_API_KEY }}
          TEAM_CONTEXT_URL: ${{ secrets.TEAM_CONTEXT_URL }}
          YAHOO_HISTORY_URL: ${{ secrets.YAHOO_HISTORY_URL }}
      - run: npm run validate && npm test
      - name: Commit refreshed cache
        run: |
          git config user.name "fantasy-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh fantasy data"
          git push
